<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>列表</title>
</head>
<body>
<ul>
    {% for post in post_list %}
    <li>
        <a href ='detail/{{post.id}}'.html>{{post.title}}</a>
        <div>
            <span>作者：{{post.owner.username}}</span>
            <span>分类：{{post.category.name}}</span>
        </div>
        <p>{{post.desc}}</p>
    </li>
    {% endfor %}
</ul>
</body>
</html>
